services:
  postgres:
    image: postgres:17
    container_name: delivery_postgres
    environment:
      POSTGRES_DB: delivery_app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./src/DeliveryWebApp.API
      dockerfile: Dockerfile
    container_name: delivery_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=delivery_db;Username=postgres;Password=postgres
      - AllowedOrigins__0=http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ./src/DeliveryWebApp.Client
      dockerfile: Dockerfile
    container_name: delivery_client
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data: